<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ather Charge Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: auto;
    padding: 20px;
    background: #000;
    color: white;
}

.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo svg {
    width: 90px;
    height: 90px;
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 25px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #333;
}

label {
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

input, select {
    background: #222;
    color: white;
}

button {
    margin-top: 16px;
    cursor: pointer;
    background: white;
    color: black;
    font-weight: bold;
}

.secondary {
    background: #333;
    color: white;
}

.result {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    margin-top: 24px;
}

.small {
    text-align: center;
    margin-top: 10px;
    color: #bbb;
}
</style>
</head>
<body>

<div class="logo">
<svg viewBox="0 0 100 100" fill="white">
    <circle cx="50" cy="50" r="45" stroke="white" stroke-width="3" fill="none"/>
    <path d="M42 20 L60 20 L52 45 L68 45 L35 80 L45 55 L30 55 Z" fill="white"/>
</svg>
</div>

<h1>Ather Charge Planner</h1>
<div class="subtitle">Smart home charging scheduler</div>

<div class="card">

<label>Scooter Model</label>
<select id="model">
    <option value="450">Ather 450 Series</option>
    <option value="rizta">Ather Rizta</option>
</select>

<label>Battery Variant</label>
<select id="battery">
    <option value="2.9">2.9 kWh</option>
    <option value="3.7">3.7 kWh</option>
</select>

<label>Charger Type</label>
<select id="charger">
    <option value="350">Standard Portable (350W)</option>
    <option value="700">Duo Charger (700W)</option>
</select>

<label>Charging Mode</label>
<select id="mode">
    <option value="regular">Regular</option>
    <option value="optimized">Optimized</option>
</select>

<label>Charger Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Current Battery %</label>
<input type="number" id="current" min="0" max="100">

<label>Target Charge</label>
<select id="target">
    <option value="80">80%</option>
    <option value="90">90%</option>
    <option value="100">100%</option>
</select>

<label>Need Fully Charged By</label>
<input type="time" id="readyTime">

<button onclick="calculate()">Calculate</button>
<button class="secondary" onclick="saveSettings()">Save Settings</button>
<button class="secondary" onclick="resetSettings()">Reset</button>

<div class="result" id="result"></div>
<div class="small" id="details"></div>

</div>

<script>
const fullChargeTimes = {
    "450": 5.75,
    "rizta": 8.5
};

function getEfficiency(date) {
    if (!date) return 1;
    const purchase = new Date(date);
    const now = new Date();
    const years = (now - purchase)/(1000*60*60*24*365);

    if (years < 1) return 1;
    if (years < 2) return 0.97;
    if (years < 3) return 0.94;
    return 0.90;
}

function calculate() {
    const model = document.getElementById("model").value;
    const current = parseFloat(document.getElementById("current").value);
    const target = parseFloat(document.getElementById("target").value);
    const readyTime = document.getElementById("readyTime").value;
    const purchaseDate = document.getElementById("purchaseDate").value;
    const mode = document.getElementById("mode").value;

    if (!readyTime || isNaN(current)) {
        alert("Enter battery % and ready time");
        return;
    }

    const efficiency = getEfficiency(purchaseDate);
    const chargeHours = (fullChargeTimes[model] * (target-current)/100)/efficiency;

    const [h,m] = readyTime.split(":").map(Number);
    const ready = new Date();
    ready.setHours(h,m,0,0);

    const plugIn = new Date(ready - chargeHours*3600000);

    document.getElementById("result").innerText =
        "Plug in at " +
        plugIn.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    document.getElementById("details").innerHTML =
        `Charge Duration: ${chargeHours.toFixed(2)} hrs<br>
         Efficiency: ${(efficiency*100).toFixed(0)}%<br>
         Mode: ${mode}`;
}

function saveSettings() {
    ["model","battery","charger","mode","purchaseDate","target"]
    .forEach(id => localStorage.setItem(id, document.getElementById(id).value));
    alert("Settings saved");
}

function loadSettings() {
    ["model","battery","charger","mode","purchaseDate","target"]
    .forEach(id => {
        const val = localStorage.getItem(id);
        if(val) document.getElementById(id).value = val;
    });
}

function resetSettings() {
    localStorage.clear();
    location.reload();
}

loadSettings();
</script>

    <footer style="
    text-align:center;
    margin-top:30px;
    padding:20px;
    color:#777;
    font-size:14px;
    border-top:1px solid #222;">
    © 2026 Mrunal Kanta Muduli. All rights reserved.
</footer>
    
</body>
</html>
