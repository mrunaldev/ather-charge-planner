<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ather Charge Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #000;
    color: #fff;
}

.container {
    max-width: 650px;
    margin: auto;
    padding: 20px;
}

.logo {
    text-align: center;
    font-size: 42px;
    margin-bottom: 10px;
}

h1 {
    text-align: center;
    margin: 0;
}

.tabs {
    display: flex;
    margin: 20px 0;
    border-bottom: 1px solid #444;
}

.tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    background: #111;
}

.tab.active {
    background: #fff;
    color: #000;
    font-weight: bold;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

label {
    display: block;
    margin-top: 14px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: none;
    border-radius: 8px;
}

button {
    background: #fff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #111;
    border-radius: 10px;
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #888;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">⚡</div>
    <h1>Ather Charge Planner</h1>

    <div class="tabs">
        <div class="tab active" onclick="showTab('schedule')">Charging Schedule</div>
        <div class="tab" onclick="showTab('gain')">Charge Gain Calculator</div>
        <div class="tab" onclick="showTab('setup')">Setup</div>
    </div>

    <!-- Charging Schedule -->
    <div id="schedule" class="section active">
        <label>Current Charge %</label>
        <input type="number" id="currentCharge">

        <label>Target Charge Needed</label>
        <select id="targetCharge">
            <option>50</option>
            <option>60</option>
            <option>70</option>
            <option>80</option>
            <option>90</option>
            <option selected>100</option>
        </select>

        <label>Target Time</label>
        <input type="time" id="targetTime">

        <button onclick="calculateSchedule()">Calculate</button>
        <div id="scheduleResult" class="result"></div>
    </div>

    <!-- Charge Gain Calculator -->
    <div id="gain" class="section">
        <label>Current Charge %</label>
        <input type="number" id="gainCurrent">

        <label>Target Time</label>
        <input type="time" id="gainTime">

        <button onclick="calculateGain()">Calculate</button>
        <div id="gainResult" class="result"></div>
    </div>

    <!-- Setup -->
    <div id="setup" class="section">
        <label>Ather Model</label>
        <select id="model">
            <option>450 2.9</option>
            <option>450 3.7</option>
            <option>Rizta 2.9</option>
            <option>Rizta 3.7</option>
        </select>

        <label>Charger Type</label>
        <select id="charger">
            <option value="350">Standard Portable (350W)</option>
            <option value="700">Duo Charger (700W)</option>
        </select>

        <label>Optimized Charging</label>
        <select id="optimized">
            <option>No (Regular)</option>
            <option>Yes (Same speed as regular)</option>
        </select>

        <label>Charger Purchase Date</label>
        <input type="date" id="purchaseDate">

        <button onclick="saveSettings()">Save Settings</button>
    </div>

    <footer>
        © Mrunal Kanta Muduli
    </footer>
</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(tab).classList.add('active');

    const index = {
        schedule:0,
        gain:1,
        setup:2
    };

    document.querySelectorAll('.tab')[index[tab]].classList.add('active');
}

function saveSettings() {
    const settings = {
        model: model.value,
        charger: charger.value,
        optimized: optimized.value,
        purchaseDate: purchaseDate.value
    };

    localStorage.setItem("atherSettings", JSON.stringify(settings));
    alert("Settings Saved");
    showTab('schedule');
}

function loadSettings() {
    const saved = localStorage.getItem("atherSettings");

    if (!saved) {
        showTab('setup');
        return;
    }

    const s = JSON.parse(saved);

    model.value = s.model;
    charger.value = s.charger;
    optimized.value = s.optimized;
    purchaseDate.value = s.purchaseDate;
}

function getChargeRate() {
    const charger = parseInt(document.getElementById("charger").value);

    return charger === 700 ? 20 : 10;
}

function formatTime(date) {
    return date.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
    });
}

function calculateSchedule() {
    const current = parseInt(currentCharge.value);
    const target = parseInt(targetCharge.value);
    const targetTime = targetTimeInput();

    const rate = getChargeRate();
    const needed = target - current;
    const mins = (needed / rate) * 60;

    targetTime.setMinutes(targetTime.getMinutes() - mins);

    scheduleResult.innerHTML =
        "Plug in at: <b>" + formatTime(targetTime) + "</b>";
}

function calculateGain() {
    const current = parseInt(gainCurrent.value);
    const targetTime = gainTimeInput();

    const now = new Date();
    const diff = (targetTime - now) / 60000;

    const rate = getChargeRate();
    const gain = (diff / 60) * rate;

    gainResult.innerHTML =
        "Estimated charge by then: <b>" +
        Math.min(100, Math.round(current + gain)) +
        "%</b>";
}

function targetTimeInput() {
    const val = document.getElementById("targetTime").value;
    const [h,m] = val.split(":");
    const d = new Date();
    d.setHours(h,m,0,0);
    return d;
}

function gainTimeInput() {
    const val = document.getElementById("gainTime").value;
    const [h,m] = val.split(":");
    const d = new Date();
    d.setHours(h,m,0,0);
    return d;
}

loadSettings();
</script>

</body>
</html>
