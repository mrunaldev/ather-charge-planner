<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ather Charge Planner</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: auto;
        padding: 20px;
        background: #111827;
        color: white;
    }

    .card {
        background: #1f2937;
        padding: 20px;
        border-radius: 14px;
        margin-bottom: 20px;
    }

    h1 {
        text-align: center;
    }

    label {
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    button {
        margin-top: 18px;
        cursor: pointer;
        background: #2563eb;
        color: white;
    }

    .secondary {
        background: #374151;
    }

    .result {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        color: #22c55e;
        margin-top: 20px;
    }

    .small {
        text-align: center;
        margin-top: 10px;
        color: #d1d5db;
    }
</style>
</head>
<body>

<h1>Ather Charge Planner</h1>

<div class="card">

<label>Scooter Model</label>
<select id="model">
    <option value="450">Ather 450 Series</option>
    <option value="rizta">Ather Rizta</option>
</select>

<label>Battery Variant</label>
<select id="battery">
    <option value="2.9">2.9 kWh</option>
    <option value="3.7">3.7 kWh</option>
</select>

<label>Charger Type</label>
<select id="charger">
    <option value="350">Standard Portable (350W)</option>
    <option value="700">Duo Charger (700W)</option>
</select>

<label>Charging Mode</label>
<select id="mode">
    <option value="regular">Regular</option>
    <option value="optimized">Optimized</option>
</select>

<label>Charger Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Current Battery %</label>
<input type="number" id="current" min="0" max="100">

<label>Target Charge</label>
<select id="target">
    <option value="80">80%</option>
    <option value="90">90%</option>
    <option value="100">100%</option>
</select>

<label>Need Fully Charged By</label>
<input type="time" id="readyTime">

<button onclick="calculate()">Calculate</button>
<button class="secondary" onclick="saveSettings()">Save Settings</button>
<button class="secondary" onclick="resetSettings()">Reset</button>

<div class="result" id="result"></div>
<div class="small" id="details"></div>

</div>

<script>
const fullChargeTimes = {
    "450": 5.75,
    "rizta": 8.5
};

function getEfficiency(purchaseDate) {
    if (!purchaseDate) return 1;

    const purchase = new Date(purchaseDate);
    const now = new Date();
    const years = (now - purchase) / (1000 * 60 * 60 * 24 * 365);

    if (years < 1) return 1;
    if (years < 2) return 0.97;
    if (years < 3) return 0.94;
    return 0.90;
}

function calculate() {
    const model = document.getElementById("model").value;
    const current = parseFloat(document.getElementById("current").value);
    const target = parseFloat(document.getElementById("target").value);
    const readyTime = document.getElementById("readyTime").value;
    const purchaseDate = document.getElementById("purchaseDate").value;
    const mode = document.getElementById("mode").value;

    if (!readyTime || isNaN(current)) {
        alert("Please enter battery % and ready time.");
        return;
    }

    const efficiency = getEfficiency(purchaseDate);
    const fullHours = fullChargeTimes[model];

    const requiredPercent = target - current;

    if (requiredPercent <= 0) {
        document.getElementById("result").innerText =
            "Battery already at target";
        return;
    }

    const chargeHours = (fullHours * requiredPercent / 100) / efficiency;

    const [hours, minutes] = readyTime.split(":").map(Number);

    const ready = new Date();
    ready.setHours(hours, minutes, 0, 0);

    const plugIn = new Date(ready.getTime() - chargeHours * 3600000);

    const plugTime = plugIn.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    document.getElementById("result").innerText =
        `Plug in at ${plugTime}`;

    document.getElementById("details").innerHTML =
        `Charge Duration: ${chargeHours.toFixed(2)} hrs<br>
         Efficiency: ${(efficiency * 100).toFixed(0)}%<br>
         Mode: ${mode}`;
}

function saveSettings() {
    const fields = [
        "model","battery","charger","mode",
        "purchaseDate","target"
    ];

    fields.forEach(id => {
        localStorage.setItem(id, document.getElementById(id).value);
    });

    alert("Settings saved");
}

function loadSettings() {
    const fields = [
        "model","battery","charger","mode",
        "purchaseDate","target"
    ];

    fields.forEach(id => {
        const val = localStorage.getItem(id);
        if (val) document.getElementById(id).value = val;
    });
}

function resetSettings() {
    localStorage.clear();
    location.reload();
}

loadSettings();
</script>

</body>
</html>
