<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ather Charge Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
}

.container {
    max-width: 650px;
    margin: auto;
    padding: 20px;
}

.logo {
    text-align: center;
    font-size: 46px;
}

h1 {
    text-align: center;
}

.tabs {
    display: flex;
    margin: 20px 0;
}

.tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    background: #111;
    cursor: pointer;
}

.tab.active {
    background: #fff;
    color: #000;
    font-weight: bold;
}

.section { display: none; }
.section.active { display: block; }

label {
    display: block;
    margin-top: 14px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
}

button {
    background: #fff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #777;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">⚡</div>
<h1>Ather Charge Planner</h1>

<div class="tabs">
<div class="tab active" onclick="showTab('schedule')">Charging Schedule</div>
<div class="tab" onclick="showTab('gain')">Charge Gain Calculator</div>
<div class="tab" onclick="showTab('setup')">Setup</div>
</div>

<!-- Charging Schedule -->
<div id="schedule" class="section active">
<label>Current Charge %</label>
<input type="number" id="currentCharge">

<label>Target Charge</label>
<select id="targetCharge">
<option>50</option>
<option>60</option>
<option>70</option>
<option>80</option>
<option>90</option>
<option selected>100</option>
</select>

<label>Target Time</label>
<input type="time" id="targetTime">

<button onclick="calculateSchedule()">Calculate</button>
<div id="scheduleResult" class="result"></div>
</div>

<!-- Gain -->
<div id="gain" class="section">
<label>Current Charge %</label>
<input type="number" id="gainCurrent">

<label>Target Time</label>
<input type="time" id="gainTime">

<button onclick="calculateGain()">Calculate</button>
<div id="gainResult" class="result"></div>
</div>

<!-- Setup -->
<div id="setup" class="section">
<label>Ather Model</label>
<select id="model" onchange="autoSelectCharger()">
<option>450 2.9</option>
<option>450 3.7</option>
<option>Rizta 2.9</option>
<option>Rizta 3.7</option>
</select>

<label>Charging Mode</label>
<select id="mode">
<option>Regular</option>
<option>Optimized</option>
</select>

<label>Charger Type</label>
<select id="charger">
<option value="350">Standard Portable (350W)</option>
<option value="700">Duo Charger (700W)</option>
</select>

<label>Charger Purchase Date</label>
<input type="date" id="purchaseDate">

<button onclick="saveSettings()">Save Settings</button>
</div>

<footer>
© Mrunal Kanta Muduli
</footer>

</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(tab).classList.add('active');

    const map = {schedule:0,gain:1,setup:2};
    document.querySelectorAll('.tab')[map[tab]].classList.add('active');
}

function autoSelectCharger() {
    const model = modelInput().toLowerCase();

    if(model.includes("3.7")) {
        charger.value = "700";
    } else {
        charger.value = "350";
    }
}

function modelInput() {
    return document.getElementById("model").value;
}

function saveSettings() {
    const settings = {
        model:model.value,
        mode:mode.value,
        charger:charger.value,
        purchaseDate:purchaseDate.value
    };

    localStorage.setItem("atherSettings", JSON.stringify(settings));
    alert("Saved");
    showTab("schedule");
}

function loadSettings() {
    const saved = localStorage.getItem("atherSettings");

    if(!saved){
        showTab("setup");
        return;
    }

    const s = JSON.parse(saved);

    model.value=s.model;
    mode.value=s.mode;
    charger.value=s.charger;
    purchaseDate.value=s.purchaseDate;
}

function getRate() {
    return charger.value == "700" ? 20 : 10;
}

function formatTime(d){
    return d.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit',
        hour12:true
    });
}

function getInputTime(id){
    const val=document.getElementById(id).value;
    const [h,m]=val.split(":");
    const d=new Date();
    d.setHours(h,m,0,0);
    return d;
}

function calculateSchedule(){
    let current=parseInt(currentCharge.value);
    let target=parseInt(targetCharge.value);
    let targetT=getInputTime("targetTime");
    let rate=getRate();
    let modeVal=mode.value;

    let mins;

    if(modeVal==="Optimized" && target>80){
        mins=((80-current)/rate)*60;
    } else {
        mins=((target-current)/rate)*60;
    }

    targetT.setMinutes(targetT.getMinutes()-mins);

    scheduleResult.innerHTML=
    "Plug in at: <b>"+formatTime(targetT)+"</b>";
}

function calculateGain(){
    let current=parseInt(gainCurrent.value);
    let targetT=getInputTime("gainTime");
    let now=new Date();

    let mins=(targetT-now)/60000;
    let gain=(mins/60)*getRate();

    gainResult.innerHTML=
    "Estimated battery: <b>"+Math.min(100,Math.round(current+gain))+"%</b>";
}

loadSettings();
</script>

</body>
</html>
