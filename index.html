<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ather Charge Planner</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.logo {
    text-align: center;
    margin-bottom: 25px;
}

.logo svg {
    width: 70px;
    height: 70px;
    fill: white;
}

.tabs {
    display: flex;
    justify-content: center;
    border-bottom: 1px solid #444;
    margin-bottom: 25px;
}

.tab {
    padding: 14px 24px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
}

.tab.active {
    border-bottom: 2px solid white;
    font-weight: bold;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

input, button, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #111;
    border: 1px solid #444;
    color: white;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    background: white;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.result {
    margin-top: 15px;
    padding: 16px;
    background: #111;
    border-radius: 8px;
}

footer {
    text-align: center;
    margin-top: 50px;
    color: #777;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<svg viewBox="0 0 64 64">
<path d="M38 2L14 34h14l-2 28 24-32H36z"/>
</svg>
<h1>Ather Charge Planner</h1>
</div>

<div class="tabs">
    <div class="tab" onclick="showTab('daily')">Daily Charge</div>
    <div class="tab" onclick="showTab('gain')">Gain Calc</div>
    <div class="tab" onclick="showTab('setup')">Setup</div>
</div>

<!-- DAILY -->
<div id="daily" class="tab-content">
    <h2>Daily Charge</h2>
    <input type="number" id="dailyCurrent" placeholder="Current Battery %" />
    <button onclick="calculateDaily()">Calculate</button>
    <div id="dailyResult" class="result"></div>
</div>

<!-- GAIN -->
<div id="gain" class="tab-content">
    <h2>Charge Gain Calculator</h2>
    <input type="number" id="gainCurrent" placeholder="Current Battery %" />
    <input type="number" id="gainTime" placeholder="Charging Time (minutes)" />
    <button onclick="calculateGain()">Calculate</button>
    <div id="gainResult" class="result"></div>
</div>

<!-- SETUP -->
<div id="setup" class="tab-content">
    <h2>Setup</h2>

    <input type="number" id="chargeSpeed" placeholder="Charge Speed (% per hour)" />

    <input type="number" id="targetPercent" placeholder="Target Charge %" />

    <input type="date" id="purchaseDate" />

    <select id="sameSpeed">
        <option value="yes">Same speed as regular</option>
        <option value="no">Custom speed</option>
    </select>

    <button onclick="saveSettings()">Save Settings</button>

    <div id="setupResult" class="result"></div>
</div>

<footer>
© 2025 Mrunal Kanta Muduli
</footer>

</div>

<script>
let settings = JSON.parse(localStorage.getItem("atherSettings"));

function showTab(tab) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    document.getElementById(tab).classList.add("active");

    const tabs = document.querySelectorAll(".tab");
    if(tab==="daily") tabs[0].classList.add("active");
    if(tab==="gain") tabs[1].classList.add("active");
    if(tab==="setup") tabs[2].classList.add("active");
}

function saveSettings() {
    settings = {
        speed: parseFloat(document.getElementById("chargeSpeed").value),
        target: parseFloat(document.getElementById("targetPercent").value),
        purchaseDate: document.getElementById("purchaseDate").value,
        sameSpeed: document.getElementById("sameSpeed").value
    };

    localStorage.setItem("atherSettings", JSON.stringify(settings));

    document.getElementById("setupResult").innerHTML = "Settings saved successfully.";
    showTab("daily");
}

function calculateDaily() {
    if (!settings) return;

    const current = parseFloat(document.getElementById("dailyCurrent").value);

    const needed = settings.target - current;
    const hours = needed / settings.speed;

    const finish = new Date();
    finish.setHours(finish.getHours() + hours);

    document.getElementById("dailyResult").innerHTML =
        `Charge for <b>${hours.toFixed(2)} hrs</b><br>
         Finish by <b>${finish.toLocaleTimeString()}</b>`;
}

function calculateGain() {
    if (!settings) return;

    const current = parseFloat(document.getElementById("gainCurrent").value);
    const mins = parseFloat(document.getElementById("gainTime").value);

    const gain = (settings.speed / 60) * mins;
    const finalCharge = Math.min(current + gain, 100);

    document.getElementById("gainResult").innerHTML =
        `Expected Battery: <b>${finalCharge.toFixed(1)}%</b><br>
         Gain: <b>+${gain.toFixed(1)}%</b>`;
}

if (!settings) {
    showTab("setup");
} else {
    showTab("daily");
}
</script>

</body>
</html>
