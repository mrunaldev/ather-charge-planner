<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<title>Ather Charge Planner</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
}

.container {
    max-width: 720px;
    margin: auto;
    padding: 24px;
}

.logo {
    text-align: center;
    font-size: 64px;
    margin: 10px 0;
}

h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
}

.tab {
    flex: 1;
    padding: 16px;
    text-align: center;
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
}

.tab.active {
    background: #fff;
    color: #000;
    font-weight: bold;
}

.section {
    display: none;
    background: #0d0d0d;
    padding: 24px;
    border-radius: 16px;
    border: 1px solid #222;
}

.section.active {
    display: block;
}

label {
    display: block;
    margin-top: 18px;
    margin-bottom: 8px;
    font-size: 13px;
}

input, select, button {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #333;
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
}

input, select {
    background: #111;
    color: #fff;
}

button {
    background: #fff;
    color: #000;
    font-weight: bold;
    margin-top: 24px;
    cursor: pointer;
}

.result {
    margin-top: 24px;
    background: #111;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid #333;
    text-align: center;
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #666;
    font-size: 12px;
}

@media (max-width: 600px) {
    .tabs {
        flex-direction: column;
    }

    .logo {
        font-size: 52px;
    }

    h1 {
        font-size: 22px;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="logo">⌁</div>
<h1>Ather Charge Planner</h1>

<div class="tabs">
    <div class="tab active" onclick="showTab('schedule')">Charging Schedule</div>
    <div class="tab" onclick="showTab('gain')">Charge Gain Calculator</div>
    <div class="tab" onclick="showTab('setup')">Setup</div>
</div>

<!-- Charging Schedule -->
<div id="schedule" class="section active">
    <label>Current Charge %</label>
    <input type="number" id="currentCharge">

    <label>Target Charge Needed</label>
    <select id="targetCharge">
        <option>50</option>
        <option>60</option>
        <option>70</option>
        <option>80</option>
        <option>90</option>
        <option selected>100</option>
    </select>

    <label>Target Time</label>
    <input type="time" id="targetTime">

    <button onclick="calculateSchedule()">Calculate</button>
    <div id="scheduleResult" class="result"></div>
</div>

<!-- Charge Gain -->
<div id="gain" class="section">
    <label>Current Charge %</label>
    <input type="number" id="gainCurrent">

    <label>Target Time</label>
    <input type="time" id="gainTime">

    <button onclick="calculateGain()">Calculate</button>
    <div id="gainResult" class="result"></div>
</div>

<!-- Setup -->
<div id="setup" class="section">
    <label>Ather Model</label>
    <select id="model" onchange="autoSelectCharger()">
        <option>450 2.9</option>
        <option>450 3.7</option>
        <option>Rizta 2.9</option>
        <option>Rizta 3.7</option>
    </select>

    <label>Charging Mode</label>
    <select id="mode">
        <option>Regular</option>
        <option>Optimized</option>
    </select>

    <label>Charger Type</label>
    <select id="charger">
        <option value="350">Standard Portable (350W)</option>
        <option value="700">Duo Charger (700W)</option>
    </select>

    <label>Charger Purchase Date</label>
    <input type="date" id="purchaseDate">

    <button onclick="saveSettings()">Save Settings</button>
</div>

<footer>
© Mrunal Kanta Muduli
</footer>

</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(tab).classList.add('active');

    const map = {schedule:0,gain:1,setup:2};
    document.querySelectorAll('.tab')[map[tab]].classList.add('active');
}

function autoSelectCharger() {
    const model = document.getElementById("model").value;

    if(model.includes("3.7")) {
        document.getElementById("charger").value = "700";
    } else {
        document.getElementById("charger").value = "350";
    }
}

function saveSettings() {
    const settings = {
        model: model.value,
        mode: mode.value,
        charger: charger.value,
        purchaseDate: purchaseDate.value
    };

    localStorage.setItem("atherSettings", JSON.stringify(settings));
    alert("Settings Saved");
    showTab("schedule");
}

function loadSettings() {
    const saved = localStorage.getItem("atherSettings");

    if(!saved){
        showTab("setup");
        return;
    }

    const s = JSON.parse(saved);

    model.value = s.model;
    mode.value = s.mode;
    charger.value = s.charger;
    purchaseDate.value = s.purchaseDate;
}

function getRate() {
    return charger.value == "700" ? 20 : 10;
}

function formatTime(d) {
    return d.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit',
        hour12:true
    });
}

function getInputTime(id) {
    const val = document.getElementById(id).value;
    const [h,m] = val.split(":");
    const d = new Date();
    d.setHours(h,m,0,0);
    return d;
}

function calculateSchedule() {
    let current = parseInt(currentCharge.value);
    let target = parseInt(targetCharge.value);
    let targetT = getInputTime("targetTime");
    let rate = getRate();
    let modeVal = mode.value;

    let mins;

    if(modeVal === "Optimized" && target > 80){
        mins = ((80-current)/rate)*60;
    } else {
        mins = ((target-current)/rate)*60;
    }

    targetT.setMinutes(targetT.getMinutes() - mins);

    scheduleResult.innerHTML =
        "PLUG IN AT <br><br><b>" + formatTime(targetT) + "</b>";
}

function calculateGain() {
    let current = parseInt(gainCurrent.value);
    let targetT = getInputTime("gainTime");
    let now = new Date();

    let mins = (targetT-now)/60000;
    let gain = (mins/60)*getRate();

    gainResult.innerHTML =
        "ESTIMATED BATTERY <br><br><b>" +
        Math.min(100, Math.round(current+gain)) +
        "%</b>";
}

loadSettings();
</script>

</body>
</html>
